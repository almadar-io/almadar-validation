name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm exec eslint --no-warn-ignored --max-warnings 0 src/

  validate-service:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('service/*.orb') != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install orbital CLI
        run: npm install -g @almadar/cli

      - name: Validate service schema
        run: orbital validate service/*.orb
